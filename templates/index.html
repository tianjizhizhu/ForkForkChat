<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>📚 超级简单的图书管理系统</title>
</head>
<body>
    <h1>📚 我的图书管理系统</h1>

    <!-- 添加新书的表单 -->
    <h2>✨ 添加一本新书</h2>
    <form method="POST">
        <p>
            <label>书名：</label>
            <input type="text" name="title" required style="margin-left: 5px;">
        </p>
        <p>
            <label>作者：</label>
            <input type="text" name="author" required style="margin-left: 5px;">
        </p>
        <p>
            <button type="submit">添加图书</button>
        </p>
    </form>

    <!-- 图书列表 -->
    <h2>📖 当前图书列表</h2>
    {% if books %}
        <ul>
        {% for book in books %}
            <li>
                《{{ book.title }}》 —— {{ book.author }}
                <form method="POST" action="/delete/{{ book.id }}" style="display: inline; margin-left: 10px;">
                    <button type="submit" onclick="return confirm('确定要删除《{{ book.title }}》吗？');">
                        删除
                    </button>
                </form>
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p>还没有图书，快去添加一本吧！</p>
    {% endif %}
</body>
</html>
